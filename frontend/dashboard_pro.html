<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bamania's Cine AI | App</title>
  <meta http-equiv="refresh" content="0; url=/" />
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: light;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(192,132,252,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,0.14), transparent 24%),
        linear-gradient(180deg, #f8fafc 0%, #eef2ff 48%, #ffffff 100%);
      color: #0f172a;
    }
    .card {
      width: min(92vw, 560px);
      padding: 32px;
      border-radius: 28px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 30px 60px -35px rgba(15,23,42,0.35);
      text-align: center;
      backdrop-filter: blur(14px);
    }
    .logo {
      display: inline-grid;
      place-items: center;
      width: 64px;
      height: 64px;
      border-radius: 20px;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #a855f7 0%, #ec4899 60%, #fb923c 100%);
      color: white;
      font-size: 30px;
      font-weight: 700;
      box-shadow: 0 16px 30px -16px rgba(217,70,239,0.6);
    }
    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      letter-spacing: -0.04em;
    }
    p {
      margin: 12px 0 0;
      line-height: 1.6;
      color: #475569;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 22px;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed 0%, #d946ef 100%);
      color: white;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 18px 35px -20px rgba(124,58,237,0.65);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">🎬</div>
    <h1>Bamania's Cine AI</h1>
    <p>Loading the latest app experience with your recent UI updates, responsive project controls, generation settings, and preview improvements.</p>
    <a href="/">Open App</a>
  </main>
  <script>
    window.location.replace('/');
  </script>
</body>
</html>
